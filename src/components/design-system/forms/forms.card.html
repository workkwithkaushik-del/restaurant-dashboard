<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body{margin:0;padding:22px;background:var(--surface-card);font-family:var(--font-sans);color:var(--text-primary)}
  .label{font:800 10px/1.2 var(--font-sans);color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:0 0 10px}
  .group{margin-bottom:18px}
  .row{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
</style></head>
<body><div id="root"></div>
<script type="text/babel" data-presets="react">
const ns = window.UXscapeDashboardDesignSystem_6e71f2;
const { FieldSelect, RangeSwitch, ViewTabs, CommandInput, Button } = ns;

function App() {
  const [outlet, setOutlet] = React.useState("all");
  const [range, setRange] = React.useState("Today");
  const [view, setView] = React.useState("overview");
  const [q, setQ] = React.useState("");
  return (
    <div>
      <div className="group">
        <p className="label">FieldSelect + RangeSwitch — toolbar row</p>
        <div className="row">
          <FieldSelect label="Outlet" value={outlet} onChange={e=>setOutlet(e.target.value)}>
            <option value="all">All outlets</option>
            <option value="central">Central Square</option>
            <option value="lake">Lake Road</option>
            <option value="campus">Campus Gate</option>
          </FieldSelect>
          <RangeSwitch options={["Today","Week","Month"]} value={range} onChange={setRange} ariaLabel="Time range" />
        </div>
      </div>

      <div className="group">
        <p className="label">ViewTabs — dark pill, active=ink</p>
        <ViewTabs options={["overview","menu","orders","inventory","staff","feedback"]} value={view} onChange={setView} />
      </div>

      <div className="group">
        <p className="label">CommandInput + action button</p>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <CommandInput placeholder="Try: low stock at Lake Road, delayed orders, chef score" value={q} onChange={e=>setQ(e.target.value)} />
          <Button variant="secondary">Export report</Button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body></html>
