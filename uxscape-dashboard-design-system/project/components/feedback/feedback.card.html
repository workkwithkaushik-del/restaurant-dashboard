<!-- @dsCard group="Components" viewport="700x540" name="Feedback — banners, modal, review card" subtitle="UsageGuideBanner, WarningBanner, Modal, FeedbackCard" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body{margin:0;padding:22px;background:var(--surface-page);font-family:var(--font-sans);color:var(--text-primary)}
  .label{font:800 10px/1.2 var(--font-sans);color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:0 0 10px}
  .group{margin-bottom:18px}
</style></head>
<body><div id="root"></div>
<script type="text/babel" data-presets="react">
const ns = window.UXscapeDashboardDesignSystem_6e71f2;
const { UsageGuideBanner, GuideStep, WarningBanner, Modal, FeedbackCard, Badge, Button } = ns;

const InfoIcon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
const ShieldIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
const Cal = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
const Store = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l1-5h16l1 5"/><path d="M5 9v11h14V9"/></svg>;
const Arrow = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;

function App() {
  const [modal, setModal] = React.useState(false);
  return (
    <div>
      <div className="group">
        <p className="label">UsageGuideBanner — warning (with steps) → success</p>
        <div style={{display:'grid',gap:12}}>
          <UsageGuideBanner
            tone="warning"
            icon={<InfoIcon/>}
            title="Quick Setup — Get accurate data"
            steps={
              <React.Fragment>
                <GuideStep status="done" icon={<Cal/>}>Date is set to today ✓</GuideStep>
                <span style={{color:'var(--muted)',display:'inline-flex'}}><Arrow/></span>
                <GuideStep status="pending" icon={<Store/>}>Step 2: Select a specific outlet</GuideStep>
                <span style={{color:'var(--muted)',display:'inline-flex'}}><Arrow/></span>
                <GuideStep status="info">Then switch back to "All Outlets"</GuideStep>
              </React.Fragment>
            }
            onDismiss={()=>{}}
          >
            For accurate, real-time numbers please follow these steps:
          </UsageGuideBanner>

          <UsageGuideBanner
            tone="success"
            icon={<InfoIcon/>}
            title="✓ Dashboard configured correctly"
          >
            You're viewing live data for a specific outlet. You can now switch to "All Outlets" for a combined view.
          </UsageGuideBanner>
        </div>
      </div>

      <div className="group">
        <p className="label">WarningBanner — inline critical condition</p>
        <WarningBanner icon={<ShieldIcon/>}>
          <strong>Critical Margin Alert:</strong> Gross margin is under 60% due to commodity inflation. Please review recipe yield metrics.
        </WarningBanner>
      </div>

      <div className="group">
        <p className="label">FeedbackCard — review ticker</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <FeedbackCard user="Priya S. (Swiggy)" rating={1} badge={<Badge tone="danger">#QualityRisk</Badge>} content="The chicken patty inside was uncooked and raw in the center!" time="15 min ago" />
          <FeedbackCard user="Vikram K. (Direct)" rating={5} badge={<Badge tone="success">#Praise</Badge>} content="Outstanding taste! The coffee blend is super aromatic, packed neatly." time="25 min ago" />
        </div>
      </div>

      <div className="group">
        <p className="label">Modal — centred dialog</p>
        <Button onClick={()=>setModal(true)}>Open modal</Button>
        <Modal open={modal} onClose={()=>setModal(false)} title="Export Report" ctaText="Download" onCta={()=>{}}>
          <p style={{margin:0,color:'var(--muted)',fontSize:13}}>The export will include all data within the currently selected scope.</p>
        </Modal>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body></html>
