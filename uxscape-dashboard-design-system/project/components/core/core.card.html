<!-- @dsCard group="Components" viewport="700x300" name="Core" subtitle="Button, IconButton, StatusPill, Badge, Avatar, BrandMark, Eyebrow" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body{margin:0;padding:22px;background:var(--surface-card);font-family:var(--font-sans);color:var(--text-primary)}
  .group{margin-bottom:18px}
  .label{font:800 10px/1.2 var(--font-sans);color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .ico{width:18px;height:18px;display:inline-block;vertical-align:middle}
</style></head>
<body><div id="root"></div>
<script type="text/babel" data-presets="react">
const ns = window.UXscapeDashboardDesignSystem_6e71f2;
const { Button, IconButton, StatusPill, Badge, Avatar, BrandMark, Eyebrow } = ns;

// Lucide icon helper as React element
const Ico = ({ name, size = 16, color }) => {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = "";
      const el = document.createElement("i");
      el.setAttribute("data-lucide", name);
      el.style.width = size + "px";
      el.style.height = size + "px";
      if (color) el.style.color = color;
      ref.current.appendChild(el);
      window.lucide.createIcons();
    }
  }, [name, size, color]);
  return <span ref={ref} style={{ display: "inline-flex" }} />;
};

function App() {
  return (
    <div>
      <div className="group">
        <div className="label">Button — primary / secondary / link / mini</div>
        <div className="row">
          <Button variant="primary">Export report</Button>
          <Button variant="secondary">Export report</Button>
          <Button variant="link">Open orders</Button>
          <Button variant="mini">Inspect</Button>
          <Button variant="primary" disabled>Disabled</Button>
        </div>
      </div>

      <div className="group">
        <div className="label">IconButton — default / dark / sm</div>
        <div className="row">
          <IconButton aria-label="bell"><Ico name="bell" /></IconButton>
          <IconButton aria-label="settings"><Ico name="settings" /></IconButton>
          <IconButton tone="dark" aria-label="panel"><Ico name="panel-left" /></IconButton>
          <IconButton size="sm" aria-label="close"><Ico name="x" size={14} /></IconButton>
        </div>
      </div>

      <div className="group">
        <div className="label">StatusPill — success / warning / danger / info / neutral</div>
        <div className="row">
          <StatusPill tone="success">Healthy</StatusPill>
          <StatusPill tone="warning">Watch</StatusPill>
          <StatusPill tone="danger">At Risk</StatusPill>
          <StatusPill tone="info">Active Stream</StatusPill>
          <StatusPill tone="neutral">EOD Snapshot</StatusPill>
        </div>
      </div>

      <div className="group">
        <div className="label">Badge — feedback auto-tags</div>
        <div className="row">
          <Badge tone="warning">#ColdFood</Badge>
          <Badge tone="danger">#QualityRisk</Badge>
          <Badge tone="success">#Praise</Badge>
          <Badge tone="neutral">#Standard</Badge>
        </div>
      </div>

      <div className="group">
        <div className="label">Avatar / BrandMark</div>
        <div className="row">
          <Avatar initials="KP" />
          <Avatar initials="MJ" variant="soft" />
          <BrandMark initials="RC" />
          <BrandMark initials="RC" size={56} />
        </div>
      </div>

      <div className="group">
        <div className="label">Eyebrow + heading pattern</div>
        <div>
          <Eyebrow>PERFORMANCE</Eyebrow>
          <h2 style={{ marginTop: 4 }}>Revenue and order trend</h2>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body></html>
