<!-- @dsCard group="Colors" viewport="700x170" name="Semantic status pairs" subtitle="bg + fg used together for pills, banners, badges" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-card)}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .row{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border-subtle);border-radius:8px}
  .pill{padding:5px 10px;border-radius:999px;font:850 12px/1 var(--font-sans);white-space:nowrap}
  .meta{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
  .name{font:700 12px/1.2 var(--font-sans);color:var(--text-primary)}
  .val{font:500 11px/1.3 var(--font-mono);color:var(--text-muted)}
</style></head>
<body>
  <div class="grid">
    <div class="row"><span class="pill" style="background:var(--status-success-bg);color:var(--status-success-fg)">Healthy</span><div class="meta"><div class="name">Success</div><div class="val">--status-success-bg / -fg</div></div></div>
    <div class="row"><span class="pill" style="background:var(--status-warning-bg);color:var(--status-warning-fg)">Watch</span><div class="meta"><div class="name">Warning</div><div class="val">--status-warning-bg / -fg</div></div></div>
    <div class="row"><span class="pill" style="background:var(--status-danger-bg);color:var(--status-danger-fg)">At Risk</span><div class="meta"><div class="name">Danger</div><div class="val">--status-danger-bg / -fg</div></div></div>
    <div class="row"><span class="pill" style="background:var(--status-info-bg);color:var(--status-info-fg)">Active</span><div class="meta"><div class="name">Info</div><div class="val">--status-info-bg / -fg</div></div></div>
  </div>
</body></html>
