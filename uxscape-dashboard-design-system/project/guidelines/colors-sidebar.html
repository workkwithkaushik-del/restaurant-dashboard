<!-- @dsCard group="Colors" viewport="700x140" name="Sidebar palette" subtitle="Sidebar is always dark; near-black with green-tinted lines" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-card)}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{display:flex;flex-direction:column;gap:6px}
  .chip{height:56px;border-radius:8px;border:1px solid var(--border-subtle)}
  .name{font:700 11px/1.2 var(--font-sans);color:var(--text-primary)}
  .val{font:500 10px/1.2 var(--font-mono);color:var(--text-muted)}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#101916"></div><div class="name">Sidebar bg</div><div class="val">#101916</div></div>
    <div class="sw"><div class="chip" style="background:#16221d"></div><div class="name">Sidebar panel</div><div class="val">#16221d</div></div>
    <div class="sw"><div class="chip" style="background:#1d2c27"></div><div class="name">Item active</div><div class="val">#1d2c27</div></div>
    <div class="sw"><div class="chip" style="background:#2a3d35"></div><div class="name">Line</div><div class="val">#2a3d35</div></div>
    <div class="sw"><div class="chip" style="background:#8ca299"></div><div class="name">Muted text</div><div class="val">#8ca299</div></div>
    <div class="sw"><div class="chip" style="background:#b0c4bb"></div><div class="name">Item text</div><div class="val">#b0c4bb</div></div>
  </div>
</body></html>
