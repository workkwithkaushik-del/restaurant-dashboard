<!-- @dsCard group="Spacing" viewport="700x180" name="Radii" subtitle="4 / 6 / 8 / 10 / 12 / 16 / 999" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-card);font-family:var(--font-sans)}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px}
  .box{width:60px;height:60px;background:var(--accent-green);border:1px solid var(--border-subtle)}
  .pill{width:90px;height:34px;background:var(--status-success-bg);color:var(--status-success-fg);display:grid;place-items:center;font:850 12px/1 var(--font-sans);border-radius:999px}
  .label{font:700 11px/1.2 var(--font-sans);color:var(--text-primary)}
  .px{font:500 10px/1.2 var(--font-mono);color:var(--text-muted)}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="label">xs</div><div class="px">4px</div></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="label">sm</div><div class="px">6px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="label">md (default)</div><div class="px">8px</div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="label">lg</div><div class="px">10px</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="label">xl</div><div class="px">12px</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="label">2xl</div><div class="px">16px</div></div>
    <div class="item"><div class="pill">Healthy</div><div class="label">pill</div><div class="px">999px</div></div>
  </div>
</body></html>
