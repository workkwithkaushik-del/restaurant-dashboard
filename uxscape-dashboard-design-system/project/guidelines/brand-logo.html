<!-- @dsCard group="Brand" viewport="700x160" name="Logo mark" subtitle="Amber-yellow gradient tile + RC monogram" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-sans);display:flex;align-items:center;gap:32px}
  .mark{width:64px;height:64px;border-radius:12px;display:grid;place-items:center;background:var(--brand-mark-bg);color:var(--brand-mark-fg);font:900 22px/1 var(--font-sans);box-shadow:var(--shadow-mark);flex-shrink:0}
  .lockup{display:flex;align-items:center;gap:12px;padding:10px;border-radius:12px;background:#101916}
  .lockup .m{width:40px;height:40px;border-radius:8px;background:var(--brand-mark-bg);color:var(--brand-mark-fg);display:grid;place-items:center;font:900 14px/1 var(--font-sans);box-shadow:var(--shadow-mark)}
  .lockup .txt strong{display:block;font:900 14px/1.2 var(--font-sans);color:#fff}
  .lockup .txt span{display:block;font:600 11px/1.2 var(--font-sans);color:#8ca299;margin-top:2px}
  .meta{font:500 11px/1.4 var(--font-mono);color:var(--text-muted);margin-top:8px}
  .col{display:flex;flex-direction:column;gap:8px}
</style></head>
<body>
  <div class="col">
    <div class="mark">RC</div>
    <div class="meta">64px · 12r · gradient #ffe08a→#f0a72f</div>
  </div>
  <div class="col">
    <div class="lockup">
      <div class="m">RC</div>
      <div class="txt"><strong>Restaurant Chain</strong><span>Dashboard</span></div>
    </div>
    <div class="meta">Sidebar lockup · 40px mark + wordmark on near-black</div>
  </div>
</body></html>
