<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Ink → wash, the greenish-neutral spine" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-card)}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{display:flex;flex-direction:column;gap:6px}
  .chip{height:64px;border-radius:8px;border:1px solid var(--border-subtle)}
  .name{font:600 12px/1.2 var(--font-sans);color:var(--text-primary)}
  .val{font:500 11px/1.2 var(--font-mono);color:var(--text-muted)}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="name">Ink</div><div class="val">#14211c</div></div>
    <div class="sw"><div class="chip" style="background:var(--soft-ink)"></div><div class="name">Soft ink</div><div class="val">#243c34</div></div>
    <div class="sw"><div class="chip" style="background:var(--muted)"></div><div class="name">Muted</div><div class="val">#68766f</div></div>
    <div class="sw"><div class="chip" style="background:var(--line)"></div><div class="name">Line</div><div class="val">#dce5de</div></div>
    <div class="sw"><div class="chip" style="background:var(--wash);border-color:var(--line)"></div><div class="name">Wash</div><div class="val">#f4f7f1</div></div>
    <div class="sw"><div class="chip" style="background:var(--panel);border-color:var(--line)"></div><div class="name">Panel</div><div class="val">#ffffff</div></div>
  </div>
</body></html>
