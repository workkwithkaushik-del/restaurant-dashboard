<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="2 / 4 / 6 / 8 / 10 / 12 / 14 / 16 / 18 / 22 / 26" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-card);font-family:var(--font-sans)}
  .row{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
  .step{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:var(--accent-green);border-radius:4px}
  .label{font:700 11px/1.2 var(--font-sans);color:var(--text-primary)}
  .px{font:500 10px/1.2 var(--font-mono);color:var(--text-muted)}
</style></head>
<body>
  <div class="row">
    <div class="step"><div class="bar" style="width:14px;height:2px"></div><div class="label">1</div><div class="px">2px</div></div>
    <div class="step"><div class="bar" style="width:14px;height:4px"></div><div class="label">2</div><div class="px">4px</div></div>
    <div class="step"><div class="bar" style="width:14px;height:6px"></div><div class="label">3</div><div class="px">6px</div></div>
    <div class="step"><div class="bar" style="width:14px;height:8px"></div><div class="label">4</div><div class="px">8px</div></div>
    <div class="step"><div class="bar" style="width:14px;height:10px"></div><div class="label">5</div><div class="px">10px</div></div>
    <div class="step"><div class="bar" style="width:14px;height:12px"></div><div class="label">6</div><div class="px">12px</div></div>
    <div class="step"><div class="bar" style="width:14px;height:14px"></div><div class="label">7</div><div class="px">14px</div></div>
    <div class="step"><div class="bar" style="width:14px;height:16px"></div><div class="label">8</div><div class="px">16px</div></div>
    <div class="step"><div class="bar" style="width:14px;height:18px"></div><div class="label">9</div><div class="px">18px</div></div>
    <div class="step"><div class="bar" style="width:14px;height:22px"></div><div class="label">10</div><div class="px">22px</div></div>
    <div class="step"><div class="bar" style="width:14px;height:26px"></div><div class="label">11</div><div class="px">26px</div></div>
    <div class="step"><div class="bar" style="width:14px;height:32px"></div><div class="label">12</div><div class="px">32px</div></div>
  </div>
</body></html>
