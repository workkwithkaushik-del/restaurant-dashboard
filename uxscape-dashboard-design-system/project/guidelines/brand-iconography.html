<!-- @dsCard group="Brand" viewport="700x200" name="Iconography" subtitle="Lucide stroke icons, 18-20px, currentColor" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-sans)}
  .row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px}
  .icon-tile{display:flex;flex-direction:column;align-items:center;gap:6px;width:64px}
  .icon-tile .box{width:44px;height:44px;border:1px solid var(--border-subtle);border-radius:8px;display:grid;place-items:center;color:var(--text-primary);background:var(--wash)}
  .icon-tile .lbl{font:500 10px/1.2 var(--font-sans);color:var(--text-muted);text-align:center;white-space:nowrap}
  .ctx{display:flex;gap:10px;align-items:center;padding:10px 14px;background:var(--ink);border-radius:8px}
  .ctx .item{display:flex;align-items:center;gap:8px;color:#b0c4bb;font:700 13px/1 var(--font-sans);padding:8px 12px;border-radius:8px}
  .ctx .item.active{background:#1d2c27;border:1px solid #3a5a4c;color:#fff}
  .note{font:500 11px/1.4 var(--font-mono);color:var(--text-muted);margin-top:10px}
</style></head>
<body>
  <div class="row">
    <div class="icon-tile"><div class="box"><i data-lucide="layout-dashboard" width="20" height="20"></i></div><div class="lbl">layout-dashboard</div></div>
    <div class="icon-tile"><div class="box"><i data-lucide="utensils-crossed" width="20" height="20"></i></div><div class="lbl">utensils-crossed</div></div>
    <div class="icon-tile"><div class="box"><i data-lucide="shopping-cart" width="20" height="20"></i></div><div class="lbl">shopping-cart</div></div>
    <div class="icon-tile"><div class="box"><i data-lucide="package" width="20" height="20"></i></div><div class="lbl">package</div></div>
    <div class="icon-tile"><div class="box"><i data-lucide="chef-hat" width="20" height="20"></i></div><div class="lbl">chef-hat</div></div>
    <div class="icon-tile"><div class="box"><i data-lucide="trending-up" width="20" height="20"></i></div><div class="lbl">trending-up</div></div>
    <div class="icon-tile"><div class="box"><i data-lucide="bell" width="20" height="20"></i></div><div class="lbl">bell</div></div>
    <div class="icon-tile"><div class="box"><i data-lucide="shield-alert" width="20" height="20" style="color:var(--coral)"></i></div><div class="lbl">shield-alert</div></div>
  </div>
  <div class="ctx">
    <div class="item active"><i data-lucide="layout-dashboard" width="18" height="18"></i>Overview</div>
    <div class="item"><i data-lucide="shopping-cart" width="18" height="18"></i>Orders</div>
    <div class="item"><i data-lucide="package" width="18" height="18"></i>Inventory</div>
  </div>
  <div class="note">Lucide v0.460 · stroke 2 · 18px in sidebar, 20px for tile contexts · color: currentColor</div>
  <script>lucide.createIcons();</script>
</body></html>
