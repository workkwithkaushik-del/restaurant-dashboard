<!-- @dsCard group="Colors" viewport="700x200" name="Ambient gradients" subtitle="Workspace wash + hero band — the only two atmospheric surfaces" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-card)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .demo{height:130px;border-radius:10px;border:1px solid var(--border-subtle);padding:14px;display:flex;flex-direction:column;justify-content:flex-end;gap:4px}
  .demo--workspace{background:var(--workspace-bg)}
  .demo--hero{background:var(--hero-bg);border-color:var(--border-success)}
  .label{font:700 12px/1.2 var(--font-sans);color:var(--text-primary)}
  .val{font:500 11px/1.3 var(--font-mono);color:var(--text-muted)}
</style></head>
<body>
  <div class="grid">
    <div class="demo demo--workspace">
      <div class="label">--workspace-bg</div>
      <div class="val">green NW + amber SE over wash</div>
    </div>
    <div class="demo demo--hero">
      <div class="label">--hero-bg</div>
      <div class="val">white → pale green → pale amber diagonal</div>
    </div>
  </div>
</body></html>
